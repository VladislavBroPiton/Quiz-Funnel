<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0a0a0f">
    <title>Quiz Trader</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="/webapp/static/style.css">
</head>
<body>
    <div class="container">
        <div class="logo">
            <img src="/webapp/static/logo.png" alt="Quiz Trader" style="width:48px;height:48px;border-radius:50%">
            <h1>Quiz Trader</h1>
        </div>
        <div class="subtitle">УЗНАЙ СВОЙ ПРОФИЛЬ ТРЕЙДЕРА</div>

        <form id="quizForm">
            <!-- Шаг 1: Опыт -->
            <div class="step step-1 active">
                <div class="form-group">
                    <label>📈 Ваш опыт в трейдинге</label>
                    <select name="experience" required>
                        <option value="beginner">👶 Новичок (меньше года)</option>
                        <option value="intermediate">🧑 Продвинутый (1-3 года)</option>
                        <option value="experienced">👴 Профессионал (более 3 лет)</option>
                    </select>
                </div>
                <div class="step-buttons">
                    <button type="button" class="next-btn">Далее →</button>
                </div>
            </div>

            <!-- Шаг 2: Стиль торговли -->
            <div class="step step-2">
                <div class="form-group">
                    <label>⚡ Предпочитаемый стиль</label>
                    <select name="trading_style" required>
                        <option value="scalping">Скальпинг (быстрые сделки)</option>
                        <option value="day_trading">Дейтрейдинг (внутри дня)</option>
                        <option value="swing">Свинг (недели)</option>
                        <option value="long_term">Долгосрочные инвестиции</option>
                    </select>
                </div>
                <div class="step-buttons">
                    <button type="button" class="prev-btn">← Назад</button>
                    <button type="button" class="next-btn">Далее →</button>
                </div>
            </div>

            <!-- Шаг 3: Цели -->
            <div class="step step-3">
                <div class="form-group">
                    <label>🎯 Ваша главная цель</label>
                    <select name="goal" required>
                        <option value="income">Стабильный доход</option>
                        <option value="growth">Рост капитала</option>
                        <option value="speculation">Спекуляция</option>
                    </select>
                </div>
                <div class="step-buttons">
                    <button type="button" class="prev-btn">← Назад</button>
                    <button type="button" class="next-btn">Далее →</button>
                </div>
            </div>

            <!-- Шаг 4: Отношение к риску -->
            <div class="step step-4">
                <div class="form-group">
                    <label>⚠️ Допустимый риск на сделку</label>
                    <select name="risk_level" required>
                        <option value="low">До 1%</option>
                        <option value="medium">1-3%</option>
                        <option value="high">Более 3%</option>
                    </select>
                </div>
                <div class="step-buttons">
                    <button type="button" class="prev-btn">← Назад</button>
                    <button type="button" class="next-btn">Далее →</button>
                </div>
            </div>

            <!-- Шаг 5: Контакты -->
            <div class="step step-5">
                <div class="form-group">
                    <label>👤 Ваше имя</label>
                    <input type="text" name="name" placeholder="Александр" required>
                </div>
                <div class="form-group">
                    <label>📞 Телефон</label>
                    <input type="tel" name="phone" placeholder="+7 999 123-45-67" required>
                </div>
                <div class="step-buttons">
                    <button type="button" class="prev-btn">← Назад</button>
                    <button type="submit" id="submitBtn">✅ Узнать результат</button>
                </div>
            </div>
        </form>

        <div id="resultCard" class="result-card" style="display:none;">
    <div class="result-icon" id="resultIcon">📊</div>
    <h2 id="resultType"></h2>
    <p id="resultRecommendation"></p>
    <button id="closeResultBtn" style="margin-top: 24px; width: auto; padding: 12px 28px;">✅ Понятно, закрыть</button>
</div>
        <div id="formError" class="error-message"></div>
        <div class="progress-bar" id="progressBar" style="display:none;"><div class="progress-fill"></div></div>
    </div>
    <script src="/webapp/static/script.js"></script>
</body>
</html>
